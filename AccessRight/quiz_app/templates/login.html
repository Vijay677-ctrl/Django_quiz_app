{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="form-page-layout">
    <div class="card login-card-single">
        <h2 class="section-title text-center"><i class="fas fa-sign-in-alt"></i> Sign In</h2>

        <form method="post" class="quiz-form-container">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-error form-error-message">
                    <p><i class="fas fa-exclamation-circle"></i> Invalid username or password. Please try again.</p>
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Username:</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="id_password">Password:</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary btn-lg action-btn login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <p class="form-footer-link">
            <a href="{% url 'login_selection' %}" class="btn-text-link">&larr; Back to Role Selection</a>
        </p>
    </div>
</div>
{% endblock %}
