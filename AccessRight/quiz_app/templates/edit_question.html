{% extends 'base.html' %}
{% block content %}
<div class="form-container card" style="max-width: 800px; margin: 20px auto; padding: 30px;">
    <h2><i class="fas fa-edit"></i> Edit Question for {{ quiz.title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions" style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'teacher_questions_review' quiz.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
